<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- 波斯猫 · Persian, white/cream long-fur, flat face, copper eyes -->
  <!-- Long-hair scallop outline (fluffy mane) -->
  <path d="M14,60 Q12,42 22,30 Q18,22 32,22 Q40,12 50,16 Q60,12 68,22 Q82,22 78,30 Q88,42 86,60 Q90,76 80,82 Q74,90 64,86 Q58,94 50,90 Q42,94 36,86 Q26,90 20,82 Q10,76 14,60 Z"
        fill="#f6efe0"/>
  <!-- Lower-set, smaller ears (波斯特征) -->
  <polygon points="28,38 26,50 38,48" fill="#dcc9a8"/>
  <polygon points="72,38 74,50 62,48" fill="#dcc9a8"/>
  <polygon points="30,42 29,48 34,47" fill="#f0d2d8"/>
  <polygon points="70,42 71,48 66,47" fill="#f0d2d8"/>
  <!-- Wider rounder face (flatter look) -->
  <ellipse cx="50" cy="64" rx="32" ry="28" fill="#fbf6ea"/>
  <!-- Big copper eyes — Persian hallmark -->
  <ellipse cx="38" cy="60" rx="5.4" ry="6.2" fill="#222"/>
  <ellipse cx="62" cy="60" rx="5.4" ry="6.2" fill="#222"/>
  <ellipse cx="38" cy="59" rx="3.2" ry="4.2" fill="#c87a30"/>
  <ellipse cx="62" cy="59" rx="3.2" ry="4.2" fill="#c87a30"/>
  <ellipse cx="39" cy="57" rx="1.3" ry="1.8" fill="#fff"/>
  <ellipse cx="63" cy="57" rx="1.3" ry="1.8" fill="#fff"/>
  <!-- Squashed flat face — nose sits much higher + wider (peke-faced) -->
  <ellipse cx="50" cy="70" rx="4" ry="2.4" fill="#e89aa6"/>
  <path d="M50,72 Q46,76 43,75 M50,72 Q54,76 57,75" stroke="#5a4828" stroke-width="1.2" fill="none" stroke-linecap="round"/>
</svg>
